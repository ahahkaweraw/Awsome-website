      }
      .confetti-button {
        display: inline-block;
        padding: 12px 22px;

        border: none;

      }
      .confetti-button:hover {

      }

        }

<h1>Leighton (The cool one)</h1>

<div class="content-row">
  <div class="image-column">
    <img src="leightonsunset.JPG" alt="Cool image">
    <img src="dog.jpeg" alt="Cool image">
  </div>

  <div class="text-right">
    <p>
      🎥 <strong>Subscribe on YouTube:</strong><br>
      <a href="https://youtube.com/@Henguinz" target="_blank">
        youtube.com/@Leighton
      </a>
    </p>
    <button class="confetti-button" id="confetti-btn">🎉 Show confetti</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
  function launchConfetti() {
    confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });
    confetti({ particleCount: 80, spread: 140, origin: { y: 0.4 } });
  }

  document.getElementById('confetti-btn')?.addEventListener('click', launchConfetti);
  window.addEventListener('load', launchConfetti);
</script>
